<!DOCTYPE html>
<html>
<head>
    <title>College Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- 🔔 POPUP -->
<div class="chat-popup" id="popup">
    Use me! I can help you 👋
    <span class="popup-close" onclick="closePopup()">✖</span>
</div>

<!-- 💬 CHAT ICON -->
<div class="chat-icon" onclick="toggleChat()">💬</div>

<!-- 🧠 CHATBOX -->
<div id="chat-container" class="chat-container hidden">

    <div class="chat-header">
        🎓 College Chatbot
        <span class="close-btn" onclick="toggleChat()">✖</span>
    </div>

    <div id="chat-box" class="chat-box">

        <div class="bot-msg">
            Hello! 👋 Ask me anything or choose below:
        </div>

        <div class="quick-buttons">
            <button onclick="sendMsg('fee structure')">💰 Fees</button>
            <button onclick="sendMsg('courses')">📚 Courses</button>
            <button onclick="sendMsg('admission')">📝 Admission</button>
            <button onclick="sendMsg('hostel')">🏠 Hostel</button>
            <button onclick="sendMsg('placement')">💼 Placement</button>
        </div>

    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask something..." onkeypress="handleKeyPress(event)">
        <button onclick="sendUserInput()">Send</button>
    </div>

</div>

<script>

// Toggle chat
function toggleChat() {
    document.getElementById("chat-container").classList.toggle("hidden");
}

// Close popup
function closePopup() {
    document.getElementById("popup").style.display = "none";
}

// Enter key
function handleKeyPress(e) {
    if (e.key === "Enter") sendUserInput();
}

// Send input
function sendUserInput() {
    let input = document.getElementById("user-input").value;
    if (!input.trim()) return;

    appendUser(input);
    getBotResponse(input);

    document.getElementById("user-input").value = "";
}

// Quick buttons
function sendMsg(msg) {
    appendUser(msg);
    getBotResponse(msg);
}

// Append user
function appendUser(msg) {
    let box = document.getElementById("chat-box");
    box.innerHTML += `<div class="user-msg">${msg}</div>`;
    box.scrollTop = box.scrollHeight;
}

// Append bot
function appendBot(msg) {
    let box = document.getElementById("chat-box");
    box.innerHTML += `<div class="bot-msg">${msg}</div>`;
    box.scrollTop = box.scrollHeight;
}

// Backend call
function getBotResponse(msg) {
    fetch("/get", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: "msg=" + msg
    })
    .then(res => res.json())
    .then(data => appendBot(data.response));
}

</script>

</body>
</html>
